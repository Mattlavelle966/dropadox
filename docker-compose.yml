services: 
  dropadox:
      image: node:22-alpine
      container_name: dropadox
      restart: always
      ports:
        - "3000:3000"
      volumes:
        - ./:/usr/src/app
      working_dir: /usr/src/app
      env_file:
        - ./.env
      command: sh -c "npm install && npm run build && NODE_ENV=production node .output/server/index.mjs"
      
